<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Workstation</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS VARIABLES — Change the look from here
           ============================================ */
        :root {
            --bg-primary: #080c14;
            --bg-surface: #0e1420;
            --bg-card: #141c28;
            --bg-input: #111923;
            --border: #1e2d3d;
            --border-active: #2e4a62;
            --accent: #4fc3f7;
            --accent-dim: #14303f;
            --green: #66bb6a;
            --green-dim: #122a1a;
            --red: #ef5350;
            --text: #d8dee6;
            --text-dim: #7890a5;
            --text-muted: #3e5468;
            --user-bubble: #162236;
            --user-border: #1e3450;
            --ai-bubble: transparent;
            --ai-border: transparent;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --font-mono: 'DM Mono', 'Consolas', monospace;
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden; /* CRITICAL: prevents page-level scrollbar */
            background: var(--bg-primary);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 14px;
        }

        /* ============================================
           LAYOUT — Fixed regions that NEVER resize
           ============================================
           This is what prevents the layout-breaking
           issue you had before. The three regions
           (header, messages, input) have fixed rules:
           - Header: fixed height, never grows
           - Messages: takes ALL remaining space, scrolls
           - Input: fixed height, sticks to bottom
           ============================================ */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh; /* exactly the window height */
            max-height: 100vh;
        }

        /* --- HEADER: Fixed at 54px --- */
        #header {
            height: 54px;
            min-height: 54px;
            max-height: 54px; /* triple-locked: cannot grow */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #header .title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        #header .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #header .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
        }

        #header .status-dot.connected { background: var(--green); }
        #header .status-dot.error { background: var(--red); }

        #header .status-text {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* Model selector */
        #model-select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 5px 10px;
            cursor: pointer;
            outline: none;
        }
        #model-select:focus { border-color: var(--accent); }

        /* --- MESSAGES: Fills remaining space, scrolls --- */
        #messages {
            flex: 1;           /* takes all available space */
            overflow-y: auto;  /* scrolls when content overflows */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Custom scrollbar */
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        #messages::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

        /* Message bubbles */
        .message {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .avatar {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .avatar {
            background: var(--user-border);
            color: var(--accent);
        }

        .message.assistant .avatar {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .message .content {
            padding: 10px 14px;
            border-radius: 10px;
            line-height: 1.65;
            font-size: 14px;
            min-width: 0;
            word-wrap: break-word;
        }

        .message.user .content {
            background: var(--user-bubble);
            border: 1px solid var(--user-border);
            color: var(--text);
        }

        .message.assistant .content {
            color: var(--text);
        }

        .message.assistant .content .cursor {
            display: inline-block;
            width: 2px;
            height: 14px;
            background: var(--accent);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Code blocks inside messages */
        .message .content code {
            font-family: var(--font-mono);
            font-size: 12px;
            background: var(--bg-primary);
            padding: 2px 5px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .message .content pre {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.5;
        }

        .message .content pre code {
            background: none;
            border: none;
            padding: 0;
        }

        /* Welcome message */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            gap: 12px;
            padding: 40px;
        }

        #welcome .icon {
            font-size: 36px;
            margin-bottom: 4px;
        }

        #welcome h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        #welcome p {
            font-size: 13px;
            color: var(--text-dim);
            max-width: 400px;
            line-height: 1.6;
        }

        /* --- INPUT: Fixed at bottom --- */
        #input-area {
            min-height: 72px;
            max-height: 72px; /* locked height */
            padding: 12px 20px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 720px;
        }

        #chat-input {
            flex: 1;
            height: 44px;     /* fixed height */
            max-height: 44px; /* cannot grow */
            padding: 0 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #chat-input:focus { border-color: var(--accent); }

        #chat-input::placeholder {
            color: var(--text-muted);
        }

        #send-btn {
            width: 44px;
            height: 44px;
            min-width: 44px;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        #send-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        #send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #send-btn:disabled:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- HEADER — fixed 54px -->
        <div id="header">
            <div class="title">Local AI Workstation</div>
            <div class="status">
                <select id="model-select"><option>Loading models...</option></select>
                <div class="status-dot" id="status-dot"></div>
                <span class="status-text" id="status-text">connecting...</span>
            </div>
        </div>

        <!-- MESSAGES — fills remaining space, scrolls -->
        <div id="messages">
            <div id="welcome">
                <div class="icon">⬡</div>
                <h2>Local AI Workstation</h2>
                <p>Running entirely on your machine. Select a model above and start typing.</p>
            </div>
        </div>

        <!-- INPUT — fixed 72px at bottom -->
        <div id="input-area">
            <div id="input-row">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" />
                <button id="send-btn" title="Send">↑</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // JAVASCRIPT — Frontend logic
        // ============================================
        // This ONLY handles:
        //   - Displaying messages
        //   - Capturing user input
        //   - Making HTTP requests to the Python backend
        // It does NOT do any AI logic. That's Python's job.
        // ============================================

        const API_BASE = "http://localhost:8000";

        // DOM elements
        const messagesEl = document.getElementById("messages");
        const welcomeEl = document.getElementById("welcome");
        const inputEl = document.getElementById("chat-input");
        const sendBtn = document.getElementById("send-btn");
        const modelSelect = document.getElementById("model-select");
        const statusDot = document.getElementById("status-dot");
        const statusText = document.getElementById("status-text");

        // Conversation history — sent with every request so the model has context
        let conversationHistory = [];
        let isGenerating = false;

        // --- Backend Connection ---

        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                if (res.ok) {
                    statusDot.className = "status-dot connected";
                    statusText.textContent = "connected";
                    return true;
                }
            } catch (e) {}
            statusDot.className = "status-dot error";
            statusText.textContent = "backend offline";
            return false;
        }

        async function loadModels() {
            try {
                const res = await fetch(`${API_BASE}/models`);
                const data = await res.json();
                if (data.models && data.models.length > 0) {
                    modelSelect.innerHTML = "";
                    data.models.forEach(m => {
                        const opt = document.createElement("option");
                        opt.value = m.name;
                        // Show name + human-readable size
                        const sizeGB = (m.size / 1e9).toFixed(1);
                        opt.textContent = `${m.name} (${sizeGB}GB)`;
                        modelSelect.appendChild(opt);
                    });
                    // Default to mistral if available
                    const mistral = data.models.find(m => m.name.includes("mistral"));
                    if (mistral) modelSelect.value = mistral.name;
                }
            } catch (e) {
                modelSelect.innerHTML = "<option>No models found</option>";
            }
        }

        // --- Sending Messages ---

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text || isGenerating) return;

            // Hide welcome screen on first message
            if (welcomeEl) welcomeEl.remove();

            // Add user message to UI and history
            addMessageToUI("user", text);
            conversationHistory.push({ role: "user", content: text });

            // Clear input and disable while generating
            inputEl.value = "";
            isGenerating = true;
            sendBtn.disabled = true;

            // Create empty assistant message that we'll fill with streamed tokens
            const assistantEl = addMessageToUI("assistant", "");
            const contentEl = assistantEl.querySelector(".content");

            // Add blinking cursor
            const cursor = document.createElement("span");
            cursor.className = "cursor";
            contentEl.appendChild(cursor);

            let fullResponse = "";

            try {
                // POST to the Python backend — this crosses THE WALL
                const res = await fetch(`${API_BASE}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: conversationHistory,
                        stream: true,
                    }),
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Parse Server-Sent Events (SSE) format
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // keep incomplete line in buffer

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.token) {
                                    fullResponse += data.token;
                                    // Update the message content (cursor stays at end)
                                    contentEl.textContent = fullResponse;
                                    contentEl.appendChild(cursor);
                                    // Auto-scroll to bottom
                                    messagesEl.scrollTop = messagesEl.scrollHeight;
                                }
                                if (data.done) break;
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                fullResponse = "[Error: Could not reach the backend. Is it running?]";
                contentEl.textContent = fullResponse;
            }

            // Remove cursor, save to history
            const cursorEl = contentEl.querySelector(".cursor");
            if (cursorEl) cursorEl.remove();

            conversationHistory.push({ role: "assistant", content: fullResponse });
            isGenerating = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        // --- UI Helpers ---

        function addMessageToUI(role, text) {
            const msg = document.createElement("div");
            msg.className = `message ${role}`;

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.textContent = role === "user" ? "Y" : "A";

            const content = document.createElement("div");
            content.className = "content";
            content.textContent = text;

            msg.appendChild(avatar);
            msg.appendChild(content);
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            return msg;
        }

        // --- Event Listeners ---

        sendBtn.addEventListener("click", sendMessage);

        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // --- Initialize ---

        async function init() {
            const healthy = await checkHealth();
            if (healthy) {
                await loadModels();
            }
            inputEl.focus();

            // Check health every 10 seconds
            setInterval(checkHealth, 10000);
        }

        init();
    </script>
</body>
</html>
